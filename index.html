<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Iniciar Sesión - CRM</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
<style>
.login-wrapper{min-height:100vh;display:flex;flex-direction:column;background:var(--surface);}
.login-card{width:100%;max-width:400px;margin:auto;padding:2rem;}
.login-card .card{border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.06);}
.login-card .card-body{padding:2rem;}
.login-card h2{font-size:1.3rem;font-weight:600;margin-bottom:.25rem;}
.login-card .sub{color:var(--muted);font-size:.82rem;margin-bottom:1.5rem;}
.login-card label{font-size:.8rem;font-weight:500;margin-bottom:.25rem;}
.login-card .form-control{font-size:.9rem;padding:.55rem .75rem;border:1px solid var(--border);border-radius:4px;}
.login-card .form-control:focus{border-color:#000;box-shadow:none;}
.login-card .btn-crm-solid{width:100%;padding:.55rem;font-size:.9rem;border-radius:4px;}
.login-card .footer-text{font-size:.78rem;color:var(--muted);text-align:center;margin-top:1.5rem;}
</style>
</head>
<body>
<div class="login-wrapper">
  <nav class="navbar-crm d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center">
      <span class="brand"><i class="bi bi-grid-3x3-gap-fill"></i> CRM</span>
    </div>
  </nav>

  <div class="login-card">
    <div class="card">
      <div class="card-body">
        <h2>Iniciar sesión</h2>
        <p class="sub">Ingresa tus credenciales para acceder al sistema</p>
        <form id="loginForm">
          <div class="mb-3">
            <label for="email">Correo electrónico</label>
            <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com" required>
          </div>
          <div class="mb-3">
            <label for="password">Contraseña</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn-crm-solid">Ingresar</button>
        </form>
        <div class="footer-text">
          ¿Olvidaste tu contraseña? <a href="#" style="color:#000;text-decoration:underline;">Recupérala aquí</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  window.location.href = 'leads.html';
});
</script>
</body>
</html>
